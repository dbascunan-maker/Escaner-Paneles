<!DOCTYPE html>

<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet" />

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="../js/db.js"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#99cd32",
                        "brand-green": "#4ade80",
                        "brand-yellow": "#facc15",
                        "background-light": "#f7f6f8",

                        "surface-dark": "#1e1e1e",
                    },
                    fontFamily: {
                        "display": ["Inter"]

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }

    </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Header Section -->
    <header
        class="sticky top-0 z-10 bg-white/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-primary/20 p-3">
        <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2 min-w-0 max-w-[50%]">
                    <a href="../index.html"
                        class="flex items-center justify-center size-9 rounded-full bg-primary/10 hover:bg-primary/20 transition-colors shrink-0">
                        <span class="material-symbols-outlined text-primary text-xl">arrow_back</span>
                    </a>
                    <img src="../logo_sustentambiente.png" alt="Sustentambiente"
                        class="w-7 h-7 object-contain shrink-0">
                    <h1 class="text-sm font-black tracking-tight truncate uppercase">Sustentambiente</h1>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button id="upload-report-btn"
                        class="px-3 py-2 bg-primary text-black text-[12px] font-black rounded-xl shadow-lg shadow-primary/20 hover:scale-105 transition-all flex items-center gap-1.5 shrink-0">
                        <span class="material-symbols-outlined text-lg">cloud_upload</span>
                        DRIVE
                    </button>
                    <button id="clear-all-btn"
                        class="px-3 py-2 bg-red-500/10 text-red-500 text-[10px] font-black rounded-xl border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
                        LIMPIAR
                    </button>
                </div>
            </div>
        </div>
        <!-- Search and Filters -->
        <div class="px-4 pb-4 space-y-3">
            <div id="storage-indicator" class="bg-white dark:bg-primary/5 border border-primary/20 rounded-xl p-3">
                <div class="flex justify-between items-center mb-1.5">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Uso de Memoria</span>
                    <span id="storage-pct" class="text-[10px] font-bold text-primary">0%</span>
                </div>
                <div class="w-full h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                    <div id="storage-bar" class="h-full bg-primary transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <div class="relative">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input
                    class="w-full pl-10 pr-4 py-3 bg-white dark:bg-primary/5 border border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none"
                    placeholder="Buscar paneles o ID..." type="text" />
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-primary text-white text-sm font-medium whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">calendar_today</span>
                    Hoy
                </button>
                <button
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-white dark:bg-primary/10 border border-primary/20 text-sm font-medium whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">history</span>
                    Ayer
                </button>
                <button
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-white dark:bg-primary/10 border border-primary/20 text-sm font-medium whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">date_range</span>
                    Esta semana
                </button>
                <button
                    class="flex items-center gap-2 px-4 py-2 rounded-lg bg-white dark:bg-primary/10 border border-primary/20 text-sm font-medium whitespace-nowrap">
                    <span class="material-symbols-outlined text-sm">tune</span>
                    Personalizado
                </button>
            </div>
        </div>
    </header>
    <!-- Main Content: Capture List -->
    <main id="history-container" class="flex-1 px-4 py-4 space-y-4 overflow-y-auto pb-24">
        <!-- Las capturas se cargarán aquí dinámicamente -->
        <p id="no-data" class="text-center text-slate-500 py-10 hidden">No hay capturas registradas.</p>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('history-container');
            const noDataMsg = document.getElementById('no-data');
            const clearAllBtn = document.getElementById('clear-all-btn');
            const uploadReportBtn = document.getElementById('upload-report-btn');

            // Google Drive Config: He restaurado el ID previo. Verifique si es el correcto.
            const DRIVE_PARENT_ID = '15-HgejfO7iVHI62yCi7x35FSfxbbdfpb';
            const CLIENT_ID = '1097241258833-v7m0q0i2m5n6n5n5n5n5n5n5n5n5n5n.apps.googleusercontent.com';
            let tokenClient;
            let accessToken = null;

            async function updateStorageInfo() {
                const stats = await getDbStats();
                // For IndexedDB, we don't have a rigid 5MB limit like localStorage,
                // but let's show progress based on 500 photos (the user's benchmark)
                const limit = 500;
                const pct = Math.min(Math.round((stats.count / limit) * 100), 100);
                document.getElementById('storage-bar').style.width = pct + '%';
                document.getElementById('storage-pct').textContent = `${stats.count} / ${limit}`;

                if (pct > 80) {
                    document.getElementById('storage-bar').classList.replace('bg-primary', 'bg-red-500');
                } else {
                    document.getElementById('storage-bar').classList.replace('bg-red-500', 'bg-primary');
                }
            }

            async function startDriveFlow() {
                const history = await getHistory();
                if (history.length === 0) {
                    alert("No hay capturas para subir.");
                    return;
                }

                if (!accessToken) {
                    initDriveAuth();
                    return;
                }

                uploadReportBtn.disabled = true;
                const originalText = uploadReportBtn.innerHTML;
                uploadReportBtn.innerHTML = '<span class="material-symbols-outlined text-sm animate-spin">sync</span> ...';

                try {
                    const projectName = history[0]?.projectName || "Sin_Proyecto";
                    const folderName = `SolarScan - ${projectName}`;

                    // 1. Create Folder
                    const folderId = await createDriveFolder(folderName);

                    // 2. Generate and Upload Excel
                    await uploadExcelToFolder(history, folderId, projectName);

                    // 3. Upload Photos
                    let count = 0;
                    for (const item of history) {
                        count++;
                        uploadReportBtn.innerHTML = `<span class="material-symbols-outlined text-sm animate-spin">sync</span> ${count}/${history.length}`;
                        await uploadFileToFolder(item, folderId);
                    }

                    alert("¡Reporte completo subido con éxito a Google Drive!");
                } catch (e) {
                    console.error(e);
                    alert("Error en la subida: " + e.message);
                } finally {
                    uploadReportBtn.disabled = false;
                    uploadReportBtn.innerHTML = originalText;
                }
            }

            function initDriveAuth() {
                try {
                    tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: CLIENT_ID,
                        scope: 'https://www.googleapis.com/auth/drive.file',
                        callback: (response) => {
                            if (response.error !== undefined) {
                                console.error("Error Auth:", response);
                                alert("Error de autenticación: " + (response.error_description || response.error));
                                return;
                            }
                            accessToken = response.access_token;
                            startDriveFlow();
                        },
                    });
                    tokenClient.requestAccessToken({ prompt: 'consent' });
                } catch (err) {
                    console.error("Error Init Drive:", err);
                    alert("Error al iniciar Google Drive. Verifique su Client ID.");
                }
            }

            async function createDriveFolder(name) {
                const metadata = {
                    name: name,
                    mimeType: 'application/vnd.google-apps.folder',
                    parents: [DRIVE_PARENT_ID]
                };

                const response = await fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true', {
                    method: 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }),
                    body: JSON.stringify(metadata)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error("Error creando carpeta: " + error.error.message);
                }
                const data = await response.json();
                return data.id;
            }

            async function uploadExcelToFolder(history, folderId, projectName) {
                const wb = XLSX.utils.book_new();
                const data = [];
                for (let i = 0; i < 3; i++) data.push([]);
                const headerRow = [];
                headerRow[3] = "Paneles solares";
                headerRow[4] = "codigo";
                data.push(headerRow);

                const sortedHistory = [...history].reverse();
                sortedHistory.forEach((item, index) => {
                    const row = [];
                    row[3] = index + 1;
                    row[4] = item.serial || "Sin Código";
                    data.push(row);
                });

                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!cols'] = [{ wch: 2 }, { wch: 2 }, { wch: 2 }, { wch: 15 }, { wch: 25 }];
                XLSX.utils.book_append_sheet(wb, ws, "Reporte");

                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                const blob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

                await uploadBlob(blob, `Reporte_Paneles_${projectName}.xlsx`, folderId);
            }

            async function uploadFileToFolder(item, folderId) {
                const base64Data = item.image.split(',')[1];
                const fileName = `${item.serial.replace(/[^a-z0-9]/gi, '_')}_P${item.panel}.jpg`;
                const blob = base64ToBlob(base64Data, 'image/jpeg');
                await uploadBlob(blob, fileName, folderId);
            }

            async function uploadBlob(blob, fileName, folderId) {
                const metadata = {
                    name: fileName,
                    parents: [folderId]
                };

                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                formData.append('file', blob);

                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
                    method: 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error("Error subiendo archivo: " + error.error.message);
                }
            }

            function base64ToBlob(base64, type) {
                const binary = atob(base64);
                const array = [];
                for (let i = 0; i < binary.length; i++) array.push(binary.charCodeAt(i));
                return new Blob([new Uint8Array(array)], { type: type });
            }

            uploadReportBtn.onclick = startDriveFlow;

            async function renderHistory() {
                const history = await getHistory();
                container.innerHTML = '';
                container.appendChild(noDataMsg);
                updateStorageInfo();

                if (history.length === 0) {
                    noDataMsg.classList.remove('hidden');
                    return;
                }

                noDataMsg.classList.add('hidden');

                history.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = "bg-white dark:bg-primary/5 border border-primary/10 rounded-xl p-3 flex items-center gap-4 hover:shadow-lg transition-shadow relative group";
                    card.innerHTML = `
                        <div class="size-20 rounded-lg overflow-hidden shrink-0 bg-slate-200 dark:bg-slate-800">
                            <img class="w-full h-full object-cover" src="${item.image || ''}" alt="Panel ${item.panel}">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-slate-900 dark:text-white truncate">"${item.serial}"</h3>
                            <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-tight">${item.projectName || 'Sin Proyecto'}</p>
                            <p class="text-[11px] font-bold text-primary uppercase tracking-tight">Panel Numero ${item.panel}</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[10px]">schedule</span>
                                ${item.date}
                            </p>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <button onclick="deleteAndRefresh(${item.id})" class="size-8 rounded-full bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all">
                                <span class="material-symbols-outlined text-sm">delete</span>
                            </button>
                            <span class="text-[9px] font-bold text-brand-green uppercase">Local</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }

            window.deleteAndRefresh = async (id) => {
                if (confirm('¿Borrar esta captura?')) {
                    await deleteItem(id);
                    renderHistory();
                }
            };

            clearAllBtn.addEventListener('click', async () => {
                if (confirm('¿Estás SEGURO de borrar TODO el historial? Se liberará la memoria.')) {
                    await clearHistory();
                    renderHistory();
                }
            });

            renderHistory();
        });
    </script>
    <!-- Bottom Navigation Bar -->
    <nav
        class="sticky bottom-0 w-full bg-white/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-primary/20 flex justify-around items-center px-4 pt-3 pb-6">
        <a class="flex flex-col items-center gap-1 text-slate-400"
            href="../captura_de_paneles_-_nueva_paleta/code.html">
            <span class="material-symbols-outlined text-2xl">home</span>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-primary" href="./code.html">
            <span class="material-symbols-outlined fill text-2xl">history</span>
            <span class="text-[10px] font-bold">History</span>

    </nav>
